---
- name: Prelude
  hosts: local
  gather_facts: false
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash
  roles:
    - prelude_local

- name: Cleanup
  hosts: local
  gather_facts: false
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash
  roles:
    - pcp_cleanup

- name: Adoption with Designate
  hosts: local
  gather_facts: false
  force_handlers: true
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash
  vars:
    # Enable Designate adoption with BIND9
    designate_adoption: true
    enable_designate: true
    enable_designate_bind9: true

    # Test Designate functionality after adoption
    test_designate_functionality: true

    # External network configuration for BIND9
    # This should match the uni04delta scenario network configuration
    external_network_cidr: "192.0.2.0/24"

  roles:
    - role: development_environment
      tags:
        - development_environment
    - role: tls_adoption
      tags:
        - tls_adoption
      when: enable_tlse|default(false)
    - role: backend_services
      tags:
        - backend_services
    - role: get_services_configuration
      tags:
        - get_services_configuration
    - role: stop_openstack_services
      tags:
        - stop_openstack_services
    - role: mariadb_copy
      tags:
        - mariadb_copy
    - role: ovn_adoption
      tags:
        - ovn_adoption
    - role: keystone_adoption
      tags:
        - keystone_adoption
    - role: barbican_adoption
      tags:
        - barbican_adoption
    - role: neutron_adoption
      tags:
        - neutron_adoption
    - role: designate_adoption
      tags:
        - designate_adoption
      when: designate_adoption|default(false)
    - role: swift_adoption
      tags:
        - swift_adoption
    - role: cinder_adoption
      tags:
        - cinder_adoption
    - role: glance_adoption
      tags:
        - glance_adoption
    - role: placement_adoption
      tags:
        - placement_adoption
    - role: nova_adoption
      tags:
        - nova_adoption
    - role: octavia_adoption
      tags:
        - octavia_adoption
    - role: horizon_adoption
      tags:
        - horizon_adoption
    - role: heat_adoption
      tags:
        - heat_adoption
    - role: telemetry_adoption
      tags:
        - telemetry_adoption
      when: telemetry_adoption|default(true)
    - role: autoscaling_adoption
      tags:
        - autoscaling_adoption
      when: telemetry_adoption|default(true)
    - role: stop_remaining_services
      tags:
        - stop_remaining_services
    - role: pull_openstack_configuration
      tags:
        - pull_openstack_configuration
      when: dataplane_adoption|default(true)
    - role: dataplane_adoption
      tags:
        - dataplane_adoption
      when: dataplane_adoption|default(true)
